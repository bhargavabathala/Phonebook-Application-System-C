name: Build and Run Phonebook C Project

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install GCC
        run: sudo apt-get install -y gcc

      - name: Find and Compile C file
        run: |
          find . -name "*.c" -type f
          gcc *.c -o phonebook

      - name: Success message
        run: echo "✅ Build Successful! Phonebook compiled."

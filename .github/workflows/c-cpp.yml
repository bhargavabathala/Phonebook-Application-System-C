name: Build and Run Phonebook C Project

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install GCC
        run: sudo apt-get install -y gcc

      - name: Compile C code
        run: gcc phonebook.c -o phonebook

      - name: Run the program
        run: echo "Build Successful! Phonebook compiled."
